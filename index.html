<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totem Autoatendimento PRO</title>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --green: #22c55e;
    --text: #f1f5f9;
    --border: #1f2937;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    display: flex;
    height: 100vh;
    color: var(--text);
}

/* HEADER */
.header {
    position: fixed;
    width: 60%;
    padding: 20px;
    background: rgba(2,6,23,0.9);
    backdrop-filter: blur(10px);
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid var(--border);
    z-index: 10;
}

/* CATEGORIAS */
.categorias {
    position: fixed;
    top: 70px;
    width: 60%;
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    background: #020617;
    z-index: 9;
}

.cat {
    padding: 10px 20px;
    border-radius: 10px;
    background: #0f172a;
    cursor: pointer;
    border: 1px solid var(--border);
}

.cat.active {
    background: #22c55e;
    color: black;
}

/* MENU */
.menu {
    width: 60%;
    margin-top: 130px;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
    overflow-y: auto;
}

.item {
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: .3s;
}

.item:hover { transform: scale(1.05); }

.item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.item-info {
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.item-info span { color: #22c55e; }

/* CARRINHO */
.carrinho {
    width: 40%;
    background: #020617;
    padding: 25px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.lista {
    flex-grow: 1;
    overflow-y: auto;
}

.item-carrinho {
    background: #0f172a;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* INPUT */
.input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    width: 100%;
    background: #020617;
    color: white;
}

/* BOTÕES */
.btn {
    padding: 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.cartao { background: #009ee3; color: white; }
.pix { background: var(--green); color: black; }

/* MODAL */
#modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.box {
    background: #020617;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}

#qr { width: 250px; }

</style>
</head>

<body>

<div id="modal">
    <div class="box">
        <h3>Escaneie para pagar</h3>
        <img id="qr">
        <p>Aguardando pagamento...</p>
        <button class="btn" onclick="fecharPix()">Cancelar</button>
    </div>
</div>

<div class="header">AUTOATENDIMENTO MYDI</div>

<div class="categorias">
    <div class="cat active" onclick="filtrar('lanches')">LANCHES</div>
    <div class="cat" onclick="filtrar('bebidas')">BEBIDAS</div>
</div>

<div class="menu" id="menu"></div>

<div class="carrinho">
    <h2>Pedido</h2>

    <input id="nome" class="input" placeholder="Seu nome">
    <input id="obs" class="input" placeholder="Observação">

    <div id="lista" class="lista"></div>

    <h2>Total: R$ <span id="total">0</span></h2>

    <button class="btn cartao" onclick="pagarCartao()">Cartão</button>
    <button class="btn pix" onclick="gerarPix()">Pix</button>
</div>

<script>

// PRODUTOS
const produtos = [
    {nome:"X-Burguer", preco:15, cat:"lanches", img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400"},
    {nome:"X-Bacon", preco:25, cat:"lanches", img:"https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=400"},
    {nome:"X-Tudo", preco:30, cat:"lanches", img:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=400"},
    {nome:"Coca-Cola", preco:7, cat:"bebidas", img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=400"},
    {nome:"Suco", preco:6, cat:"bebidas", img:"https://images.unsplash.com/photo-1577801594038-4d45c1c3b7f2?w=400"},
    {nome:"Água", preco:4, cat:"bebidas", img:"https://images.unsplash.com/photo-1564419320461-6870880221ad?w=400"}
];

let pedido = [];
let total = 0;
let pagamentoId = null;

// RENDER MENU
function renderMenu(cat="lanches"){
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    produtos.filter(p=>p.cat===cat).forEach(p=>{
        menu.innerHTML += `
        <div class="item" onclick="add('${p.nome}',${p.preco})">
            <img src="${p.img}">
            <div class="item-info">${p.nome} <span>R$${p.preco}</span></div>
        </div>`;
    });
}

// FILTRO
function filtrar(cat){
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    event.target.classList.add("active");
    renderMenu(cat);
}

// CARRINHO
function render(){
    let html="";
    pedido.forEach(p=>{
        html += `<div class="item-carrinho">${p.nome} - R$${p.preco}</div>`;
    });
    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

function add(nome,preco){
    pedido.push({nome,preco});
    total += preco;
    render();
}

// PAGAMENTO
function pagarCartao(){
    if(total<=0) return alert("Carrinho vazio");
    window.location.href = `mp-point://pay?amount=${total.toFixed(2)}`;
}

async function gerarPix(){

    if(total<=0) return alert("Carrinho vazio");

    document.getElementById("modal").style.display="flex";

    const res = await fetch("https://touch-pedidos.onrender.com/criar-pix",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ total, pedido })
    });

    const data = await res.json();
    document.getElementById("qr").src = data.qr;
    pagamentoId = data.id;

    verificarPagamento();
}

function fecharPix(){
    document.getElementById("modal").style.display="none";
}

function verificarPagamento(){
    const intervalo = setInterval(async ()=>{
        const res = await fetch(`https://touch-pedidos.onrender.com/verificar-pagamento?id=${pagamentoId}`);
        const data = await res.json();

        if(data.pago){
            clearInterval(intervalo);
            finalizar();
        }
    },3000);
}

// FINALIZAÇÃO
function finalizar(){
    alert("Pagamento aprovado!");

    fecharPix();
    pedido = [];
    total = 0;
    render();
}

// INICIAR
renderMenu();

</script>

</body>
</html>

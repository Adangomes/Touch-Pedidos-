<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos + PIX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #fff;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

/* PIX BOX */
.pix-box {
    display: none;
    text-align: center;
}

.qr {
    width: 200px;
    height: 200px;
    background: #fff;
    margin: 10px auto;
}
</style>
</head>

<body>

<div class="container">

    <h2>🛒 Fazer Pedido</h2>

    <div class="card">
        <label>Nome</label>
        <input type="text" id="nome">

        <label>Pedido</label>
        <input type="text" id="pedido">

        <label>Valor (R$)</label>
        <input type="number" id="valor">

        <label>Forma de pagamento</label>
        <select id="pagamento">
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
        </select>

        <button onclick="confirmarPedido()">Confirmar Pedido</button>
    </div>

    <div class="card pix-box" id="pixBox">
        <h3>💰 Pagamento via PIX</h3>

        <div class="qr" id="qrcode"></div>

        <p id="codigoPix"></p>

        <button onclick="copiarPix()">Copiar Código PIX</button>
        <button onclick="enviarCozinha()">Já paguei</button>
    </div>

</div>

<script>

// 🔹 CONFIG PIX (ALTERA AQUI)
const chavePix = "47999999999"; // sua chave real
const nomeRecebedor = "Seu Nome";
const cidade = "Jaraguá do Sul";

// 🔹 GERAR PIX (código simplificado)
function gerarPix(valor) {
    return `PIX|${chavePix}|${valor}|${nomeRecebedor}|${cidade}`;
}

// 🔹 CONFIRMAR PEDIDO
function confirmarPedido() {
    let nome = document.getElementById("nome").value;
    let pedido = document.getElementById("pedido").value;
    let valor = document.getElementById("valor").value;
    let pagamento = document.getElementById("pagamento").value;

    if(!nome || !pedido || !valor){
        alert("Preencha tudo!");
        return;
    }

    window.dadosPedido = { nome, pedido, valor };

    if(pagamento === "pix") {

        let codigo = gerarPix(valor);

        document.getElementById("pixBox").style.display = "block";
        document.getElementById("codigoPix").innerText = codigo;

        // QR CODE
        document.getElementById("qrcode").innerHTML =
            `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${codigo}">`;

    } else {
        enviarWhatsApp(nome, pedido, valor);
    }
}

// 🔹 COPIAR PIX
function copiarPix() {
    let codigo = document.getElementById("codigoPix").innerText;
    navigator.clipboard.writeText(codigo);
    alert("PIX copiado!");
}

// 🔹 ENVIAR PARA COZINHA (WHATSAPP)
function enviarCozinha() {
    let p = window.dadosPedido;
    enviarWhatsApp(p.nome, p.pedido, p.valor);
}

// 🔹 WHATSAPP AUTOMÁTICO
function enviarWhatsApp(nome, pedido, valor) {

    let numero = "5547999999999"; // seu número

    let msg = `NOVO PEDIDO%0A
Nome: ${nome}%0A
Pedido: ${pedido}%0A
Valor: R$ ${valor}`;

    window.open(`https://wa.me/${numero}?text=${msg}`, "_blank");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totem Autoatendimento PRO</title>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --green: #22c55e;
    --text: #f1f5f9;
    --border: #1f2937;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    display: flex;
    height: 100vh;
    color: var(--text);
}

/* HEADER */
.header {
    position: fixed;
    width: 60%;
    padding: 20px;
    background: rgba(2,6,23,0.8);
    backdrop-filter: blur(10px);
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid var(--border);
    z-index: 10;
}

/* MENU */
.menu {
    width: 60%;
    margin-top: 80px;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
    overflow-y: auto;
}

/* PRODUTO */
.item {
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: .3s;
}

.item:hover {
    transform: scale(1.05);
}

.item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.item-info {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    font-weight: 600;
}

.item-info span {
    color: #22c55e;
}

/* CARRINHO */
.carrinho {
    width: 40%;
    background: #020617;
    padding: 25px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.lista {
    flex-grow: 1;
    overflow-y: auto;
    margin-top: 10px;
}

.item-carrinho {
    background: #0f172a;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* INPUT */
.input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    width: 100%;
    background: #020617;
    color: white;
}

/* BOTÕES */
.btn {
    padding: 18px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
}

.cartao {
    background: #009ee3;
    color: white;
}

.pix {
    background: var(--green);
    color: white;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.box {
    background: #020617;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    border: 1px solid var(--border);
}

#qr {
    width: 250px;
    height: 250px;
    margin: 15px 0;
}

.status {
    color: #22c55e;
    font-weight: bold;
}
</style>

</head>

<body>

<div id="modal">
    <div class="box">
        <h3>Escaneie para Pagar</h3>
        <img id="qr">
        <p class="status">Aguardando pagamento...</p>
        <button class="btn" onclick="fecharPix()">Cancelar</button>
    </div>
</div>

<div class="header">AUTO ATENDIMENTO MYDI</div>

<div class="menu">

    <div class="item" onclick="add('X-Burguer',10)">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400">
        <div class="item-info">X-Burguer <span>R$10</span></div>
    </div>

    <div class="item" onclick="add('X-Bacon',25)">
        <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=400">
        <div class="item-info">X-Bacon <span>R$25</span></div>
    </div>

</div>

<div class="carrinho">
    <h2>Meu Pedido</h2>

    <input id="nome" class="input" placeholder="Seu nome">
    <input id="obs" class="input" placeholder="Observação">

    <div id="lista" class="lista"></div>

    <h2>Total: R$ <span id="total">0</span></h2>

    <button class="btn cartao" onclick="pagarCartao()">Cartão</button>
    <button class="btn pix" onclick="gerarPix()">Pix</button>
</div>

<script>

let pedido = [];
let total = 0;
let pagamentoId = null;

function render(){
    let html="";
    pedido.forEach((p)=>{
        html += `<div class="item-carrinho">${p.nome} - R$${p.preco}</div>`;
    });
    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

function add(nome,preco){
    pedido.push({nome,preco});
    total += preco;
    render();
}

function pagarCartao(){
    if(total<=0) return alert("Carrinho vazio");
    window.location.href = `mp-point://pay?amount=${total.toFixed(2)}&description=Pedido`;
}

async function gerarPix(){

    if(total<=0) return alert("Carrinho vazio");

    document.getElementById("modal").style.display="flex";

    const res = await fetch("https://touch-pedidos.onrender.com/criar-pix",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            total,
            pedido,
            nome: document.getElementById("nome").value
        })
    });

    const data = await res.json();

    document.getElementById("qr").src = data.qr;
    pagamentoId = data.id;

    verificarPagamento();
}

function fecharPix(){
    document.getElementById("modal").style.display="none";
}

function verificarPagamento(){

    const intervalo = setInterval(async ()=>{

        if(!pagamentoId) return;

        const res = await fetch(`https://touch-pedidos.onrender.com/verificar-pagamento?id=${pagamentoId}`);
        const data = await res.json();

        if(data.pago){
            clearInterval(intervalo);
            finalizar();
        }

    }, 3000);
}

function finalizar(){

    const msg = document.createElement("div");
    msg.innerText = "Pagamento aprovado ✔️";

    msg.style.position = "fixed";
    msg.style.top = "50%";
    msg.style.left = "50%";
    msg.style.transform = "translate(-50%, -50%)";
    msg.style.background = "#22c55e";
    msg.style.color = "white";
    msg.style.padding = "20px 40px";
    msg.style.fontSize = "22px";
    msg.style.borderRadius = "10px";
    msg.style.zIndex = "9999";

    document.body.appendChild(msg);

    setTimeout(() => {

        fecharPix();

        total = 0;
        pedido = [];
        document.getElementById('nome').value = "";
        render();

        msg.remove();

    }, 1500);
}
</script>

</body>
</html>

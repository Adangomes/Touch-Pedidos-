<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Balcão + Cozinha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; background:#0f172a; color:white; }

/* TELAS */
.tela { display:none; padding:10px; }
.ativa { display:block; }

/* BOTÕES */
button {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    font-size:18px;
}

/* PRODUTOS */
.produtos {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.produto {
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    text-align:center;
    font-size:18px;
}

/* PEDIDOS COZINHA */
.pedido {
    background:#1e293b;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

.pronto { background:#16a34a; }
</style>

</head>
<body>

<!-- MENU -->
<div style="display:flex;">
    <button onclick="trocar('balcao')">Balcão</button>
    <button onclick="trocar('cozinha')">Cozinha</button>
</div>

<!-- BALCÃO -->
<div id="balcao" class="tela ativa">

<h2>🛒 Pedido</h2>

<div class="produtos">
    <div class="produto" onclick="add('Hamburguer',20)">🍔 20</div>
    <div class="produto" onclick="add('Pizza',35)">🍕 35</div>
    <div class="produto" onclick="add('Refri',8)">🥤 8</div>
    <div class="produto" onclick="add('Batata',15)">🍟 15</div>
</div>

<h3 id="lista"></h3>
<h2>Total: R$ <span id="total">0</span></h2>

<button onclick="finalizar()">Finalizar (PIX)</button>

</div>

<!-- COZINHA -->
<div id="cozinha" class="tela">
<h2>👨‍🍳 Cozinha</h2>
<div id="pedidos"></div>
</div>

<script>

let carrinho = [];
let total = 0;

// TROCAR TELA
function trocar(t){
    document.querySelectorAll('.tela').forEach(e=>e.classList.remove('ativa'));
    document.getElementById(t).classList.add('ativa');
}

// ADD PRODUTO
function add(nome, valor){
    carrinho.push({nome, valor});
    total += valor;
    atualizar();
}

// ATUALIZA
function atualizar(){
    document.getElementById("lista").innerText =
        carrinho.map(i=>i.nome).join(", ");

    document.getElementById("total").innerText = total;
}

// FINALIZAR
function finalizar(){

    let pedido = {
        id: Date.now(),
        itens: carrinho,
        total: total,
        status: "novo"
    };

    let pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");
    pedidos.push(pedido);
    localStorage.setItem("pedidos", JSON.stringify(pedidos));

    alert("Pedido enviado pra cozinha!");

    carrinho = [];
    total = 0;
    atualizar();
}

// ATUALIZA COZINHA
function carregarPedidos(){

    let pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");

    let html = "";

    pedidos.forEach(p => {

        html += `
        <div class="pedido ${p.status=='pronto'?'pronto':''}">
            <b>#${p.id}</b><br>
            ${p.itens.map(i=>i.nome).join(", ")}<br>
            R$ ${p.total}
            <button onclick="pronto(${p.id})">Marcar Pronto</button>
        </div>
        `;
    });

    document.getElementById("pedidos").innerHTML = html;
}

// MARCAR PRONTO
function pronto(id){

    let pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");

    pedidos = pedidos.map(p=>{
        if(p.id === id) p.status = "pronto";
        return p;
    });

    localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

// AUTO UPDATE
setInterval(carregarPedidos, 1000);

</script>

</body>
</html>
